    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #0052CC;
            --secondary-color: #1E40AF;
            --accent-color: #10B981;
            --danger-color: #EF4444;
            --light-bg: #F9FAFB;
            --dark-bg: #111827;
            --text-dark: #1F2937;
            --text-light: #6B7280;
            --border-color: #E5E7EB;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: var(--text-dark);
            background-color: #FFFFFF;
            line-height: 1.6;
        }

        a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--secondary-color);
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            padding: 0.75rem 1.5rem;
        }

        .btn-primary:hover {
            background-color: var(--secondary-color);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background-color: white;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 0.75rem 1.5rem;
        }

        .btn-secondary:hover {
            background-color: var(--light-bg);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Navigation */
        nav {
            background-color: white;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-dark);
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary-color);
        }

        .nav-cta {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .nav-cta {
                flex-direction: column;
                gap: 0.5rem;
            }
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #0052CC 0%, #1E40AF 100%);
            color: white;
            padding: 6rem 0;
            text-align: center;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .hero-content p {
            font-size: 1.25rem;
            margin-bottom: 2rem;
            opacity: 0.95;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-cta {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hero .btn-primary {
            background-color: white;
            color: var(--primary-color);
            font-weight: 700;
            padding: 1rem 2rem;
        }

        .hero .btn-primary:hover {
            background-color: var(--light-bg);
        }

        .hero .btn-secondary {
            background-color: transparent;
            color: white;
            border-color: white;
        }

        .hero .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 768px) {
            .hero-content h1 {
                font-size: 2rem;
            }

            .hero-content p {
                font-size: 1rem;
            }

            .hero {
                padding: 3rem 0;
            }
        }

        /* Features Section */
        .features {
            padding: 5rem 0;
            background-color: var(--light-bg);
        }

        .section-title {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 1rem;
            color: var(--text-dark);
        }

        .section-subtitle {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 3rem;
            font-size: 1.125rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .feature-card {
            background-color: white;
            padding: 2rem;
            border-radius: 0.75rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            border-top: 4px solid var(--primary-color);
        }

        .feature-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .feature-card h3 {
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
            color: var(--text-dark);
        }

        .feature-card p {
            color: var(--text-light);
            line-height: 1.7;
        }

        /* Compliance Section */
        .compliance {
            padding: 5rem 0;
        }

        .compliance-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }

        .compliance-text h2 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: var(--text-dark);
        }

        .compliance-text p {
            color: var(--text-light);
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .compliance-list {
            list-style: none;
            margin: 2rem 0;
        }

        .compliance-list li {
            padding: 0.75rem 0;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .compliance-list li:before {
            content: "✓";
            color: var(--accent-color);
            font-weight: bold;
            font-size: 1.25rem;
        }

        .compliance-illustration {
            background: linear-gradient(135deg, #0052CC20 0%, #10B98120 100%);
            padding: 2rem;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }

        .compliance-illustration-text {
            font-size: 4rem;
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            .compliance-content {
                grid-template-columns: 1fr;
            }

            .compliance-illustration {
                min-height: 250px;
            }
        }

        /* Pricing Section */
        .pricing {
            padding: 5rem 0;
            background-color: var(--light-bg);
        }

        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .pricing-card {
            background-color: white;
            padding: 2rem;
            border-radius: 0.75rem;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .pricing-card.featured {
            border-color: var(--primary-color);
            transform: scale(1.05);
            box-shadow: var(--shadow-lg);
        }

        .pricing-card:hover {
            box-shadow: var(--shadow-lg);
        }

        .pricing-header h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .pricing-header p {
            color: var(--text-light);
            margin-bottom: 1.5rem;
        }

        .pricing-price {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.25rem;
        }

        .pricing-price-period {
            color: var(--text-light);
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        .pricing-features {
            list-style: none;
            margin-bottom: 2rem;
            flex-grow: 1;
        }

        .pricing-features li {
            padding: 0.5rem 0;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .pricing-features li:last-child {
            border-bottom: none;
        }

        .pricing-features li:before {
            content: "✓";
            color: var(--accent-color);
            font-weight: bold;
        }

        .pricing-cta {
            width: 100%;
            margin-top: auto;
        }

        /* Countries/Mandates Section */
        .mandates {
            padding: 5rem 0;
        }

        .mandates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .mandate-card {
            background-color: var(--light-bg);
            padding: 2rem;
            border-radius: 0.75rem;
            text-align: center;
            border-left: 4px solid var(--primary-color);
            transition: all 0.3s ease;
        }

        .mandate-card:hover {
            background-color: #E0E7FF;
            transform: translateY(-3px);
        }

        .mandate-card-flag {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }

        .mandate-card h4 {
            font-size: 1.1rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .mandate-card p {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        /* CTA Section */
        .cta {
            background: linear-gradient(135deg, #0052CC 0%, #1E40AF 100%);
            color: white;
            padding: 4rem 0;
            text-align: center;
        }

        .cta h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .cta p {
            font-size: 1.125rem;
            margin-bottom: 2rem;
            opacity: 0.95;
        }

        /* Testimonials Section */
        .testimonials {
            padding: 5rem 0;
            background-color: var(--light-bg);
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .testimonial-card {
            background-color: white;
            padding: 2rem;
            border-radius: 0.75rem;
            box-shadow: var(--shadow-sm);
        }

        .testimonial-text {
            color: var(--text-dark);
            margin-bottom: 1.5rem;
            font-style: italic;
            line-height: 1.8;
        }
